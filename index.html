<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech AI | Space & Sky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: radial-gradient(circle at center, #050b1a 0%, #000 100%);
            --text-color: #00d4ff;
            --sun-moon-shadow: 0 0 50px #00d4ff;
        }

        [data-theme="light"] {
            --bg-color: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            --text-color: #ffffff;
            --sun-moon-shadow: 0 0 60px #ffea00;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--bg-color);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            transition: background 1s ease;
        }

        /* --- Theme Switcher Animation --- */
        .theme-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            cursor: pointer;
            font-size: 1.8rem;
            background: rgba(255,255,255,0.2);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(5px);
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] .theme-switch {
            transform: rotate(360deg);
            background: rgba(0, 0, 0, 0.1);
            color: #ffea00;
        }

        /* --- Planets Styling (Only Dark Mode) --- */
        .planet {
            position: absolute;
            border-radius: 50%;
            box-shadow: inset -15px -15px 30px rgba(0,0,0,0.8);
            z-index: 1;
            transition: opacity 1s, transform 1s;
        }

        [data-theme="light"] .planet { opacity: 0; pointer-events: none; }

        .saturn { width: 100px; height: 100px; background: radial-gradient(circle at 30% 30%, #f4d03f, #9a7d0a); top: 15%; left: 10%; }
        .saturn::after { content: ""; position: absolute; top: 50%; left: 50%; width: 160%; height: 30%; border: 6px solid rgba(244, 208, 63, 0.4); border-radius: 50%; transform: translate(-50%, -50%) rotate(25deg); }

        .jupiter { width: 130px; height: 130px; background: repeating-linear-gradient( #a9703e, #d39c7e 10%, #8b4513 20% ); bottom: 15%; left: 5%; }
        
        .uranus { width: 80px; height: 80px; background: radial-gradient(circle at 30% 30%, #aed6f1, #2e86c1); top: 20%; right: 15%; }
        .neptune { width: 70px; height: 70px; background: radial-gradient(circle at 30% 30%, #5dade2, #1b4f72); bottom: 20%; right: 10%; }

        /* --- Sun Styling (Only Light Mode) --- */
        .sun {
            position: absolute;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #fff700, #ffaa00);
            border-radius: 50%;
            box-shadow: 0 0 80px #ffea00;
            top: 10%; left: 10%;
            display: none;
            z-index: 2;
        }
        [data-theme="light"] .sun { display: block; animation: sunGlow 3s ease-in-out infinite alternate; }

        @keyframes sunGlow { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.1); opacity: 1; } }

        /* --- Other Styles --- */
        .bottom-left-msg {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            transition: 0.3s ease;
        }

        .bottom-left-msg:hover { background: rgba(0, 212, 255, 0.3); transform: scale(1.05); }

        .stars-container { position: absolute; width: 100%; height: 100%; z-index: 0; transition: opacity 1s; }
        [data-theme="light"] .stars-container { opacity: 0; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--duration) infinite alternate; }

        .clouds-container { position: absolute; width: 100%; height: 100%; display: none; z-index: 1; }
        [data-theme="light"] .clouds-container { display: block; }
        .cloud { position: absolute; background: rgba(255, 255, 255, 0.8); filter: blur(20px); border-radius: 50%; animation: moveClouds 20s linear infinite; }

        @keyframes moveClouds { from { transform: translateX(-10vw); } to { transform: translateX(110vw); } }

        .welcome-msg { font-size: 3rem; font-weight: 800; text-transform: uppercase; margin-bottom: 50px; color: var(--text-color); text-shadow: var(--sun-moon-shadow); z-index: 10; }

        .container { position: relative; width: 350px; height: 350px; display: flex; justify-content: center; align-items: center; z-index: 10; }
        .brand-name { color: #ffffff; font-size: 2.2rem; font-weight: 900; text-shadow: 0 0 25px #00d4ff; padding: 10px 20px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 2px solid rgba(0, 212, 255, 0.3); border-radius: 15px; }

        .orbit { position: absolute; width: 100%; height: 100%; border: 1px dashed rgba(255, 255, 255, 0.3); border-radius: 50%; animation: rotateOrbit 15s linear infinite; }
        .icon-link { position: absolute; width: 60px; height: 60px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border-radius: 50%; display: flex; justify-content: center; align-items: center; text-decoration: none; font-size: 1.8rem; transition: 0.4s; }
        .icon-link:hover { transform: scale(1.2); background: #fff; }

        .tiktok { top: -30px; left: 50%; transform: translateX(-50%); color: #ff0050; }
        .instagram { bottom: -30px; left: 50%; transform: translateX(-50%); color: #E1306C; }
        .telegram { top: 50%; left: -30px; transform: translateY(-50%); color: #0088cc; }

        @keyframes rotateOrbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes twinkle { from { opacity: 0.2; } to { opacity: 1; } }
    </style>
</head>
<body data-theme="dark">

    <div class="stars-container" id="stars"></div>
    <div class="clouds-container" id="clouds"></div>
    <div class="sun"></div>

    <div class="theme-switch" id="themeBtn" onclick="toggleTheme()">
        <i id="theme-icon" class="fas fa-moon"></i>
    </div>

    <a href="https://t.me/falahzakho" target="_blank" class="bottom-left-msg bubble-sound">
        <i class="fas fa-envelope"></i>
        <span>Message</span>
    </a>

    <!-- Planets (Hidden in Light Mode) -->
    <div class="planet saturn"></div>
    <div class="planet jupiter"></div>
    <div class="planet uranus"></div>
    <div class="planet neptune"></div>

    <div class="welcome-msg" id="welcome-text">welcome</div>

    <div class="container">
        <div class="brand-name">Tech Ai</div>
        <div class="orbit">
            <a href="https://www.tiktok.com/@_tech_ai_?_r=1&_t=ZS-95RtUPqa7Sj" target="_blank" class="icon-link tiktok bubble-sound"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.instagram.com/__tech_.ai._?igsh=MTZ2ZGIxcXB2YjVjaw%3D%3D&utm_source=qr" target="_blank" class="icon-link instagram bubble-sound"><i class="fab fa-instagram"></i></a>
            <a href="https://t.me/tech_ai_falah" target="_blank" class="icon-link telegram bubble-sound"><i class="fab fa-telegram"></i></a>
        </div>
    </div>

    <script>
        // 1. Audio Effect Function
        function playBubbleSound() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const o = context.createOscillator();
            const g = context.createGain();
            o.type = "sine";
            o.connect(g);
            g.connect(context.destination);
            o.frequency.setValueAtTime(600, context.currentTime);
            o.frequency.exponentialRampToValueAtTime(1000, context.currentTime + 0.1);
            g.gain.setValueAtTime(0.2, context.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.1);
            o.start();
            o.stop(context.currentTime + 0.1);
        }

        // Add sound to elements
        document.querySelectorAll('.bubble-sound').forEach(el => {
            el.addEventListener('click', playBubbleSound);
        });

        // Stars Generation
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.top = Math.random() * 100 + 'vh';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            starsContainer.appendChild(star);
        }

        // Clouds Generation
        const cloudsContainer = document.getElementById('clouds');
        for (let i = 0; i < 6; i++) {
            const cloud = document.createElement('div');
            cloud.className = 'cloud';
            cloud.style.width = Math.random() * 200 + 150 + 'px';
            cloud.style.height = Math.random() * 100 + 50 + 'px';
            cloud.style.top = Math.random() * 60 + 'vh';
            cloud.style.left = Math.random() * 100 + 'vw';
            cloud.style.animationDelay = Math.random() * 10 + 's';
            cloudsContainer.appendChild(cloud);
        }

        // Welcome Text Toggle
        const welcomeText = document.getElementById('welcome-text');
        const messages = ["welcome", "بخێر بێی"];
        let index = 0;
        setInterval(() => {
            index = (index + 1) % messages.length;
            welcomeText.innerText = messages[index];
        }, 1000);

        // Theme Toggle Function
        function toggleTheme() {
            playBubbleSound();
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
                icon.className = 'fas fa-sun';
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-moon';
            }
        }
    </script>
</body>
</html>

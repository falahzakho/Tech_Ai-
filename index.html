<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech AI Official</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050a14;
            font-family: sans-serif;
            overflow: hidden;
        }

        /* لێرە وێنەیێ تە یێ ئەصلی دبیتە پاشبنەما */
        .main-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 500px; /* گونجاندن بۆ موبایلێ */
            max-height: 900px;
            background: url('https://رابط_صورة_خلفيتك_هنا.png') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* نڤیسینا خێرهاتنێ ل سەرێ شاشێ */
        #welcome-text {
            margin-top: 40px;
            font-size: 22px;
            font-weight: bold;
            color: #00e5ff;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.8);
            transition: opacity 0.5s ease;
        }

        /* تەپا دنیا - درست ل سەر وێنەی دزڤڕیت */
        .earth-overlay {
            position: absolute;
            top: 46%; /* ئەڤ جهانە دشێی کێم و زێدە کەی دا درست بکەڤنە سەر وێنەی */
            left: 23%;
            width: 110px;
            height: 110px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/2/22/Earth_Western_Hemisphere_transparent_background.png') no-repeat center;
            background-size: contain;
            border-radius: 50%;
            box-shadow: inset -5px -5px 20px #000, 0 0 20px rgba(0, 229, 255, 0.5);
            animation: spin 10s linear infinite;
        }

        /* ئایکۆنێن کو دزڤڕن ل سەر جهێ خۆ */
        .icon-link {
            position: absolute;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            animation: rotateSelf 6s linear infinite;
            overflow: hidden;
        }

        /* دیارکرنا جهێ ئایکۆنان درست وەک وێنەی */
        .instagram { top: 38%; right: 15%; }
        .telegram { top: 52%; right: 34%; }
        .tiktok { top: 62%; right: 12%; }

        .icon-link img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotateSelf {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div id="welcome-text">خێرهاتن بۆ پەیجی</div>

        <div class="earth-overlay"></div>

        <a href="https://www.instagram.com/__tech_.ai._?..." target="_blank" class="icon-link instagram">
            <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png">
        </a>
        <a href="https://t.me/tech_ai_falah" target="_blank" class="icon-link telegram">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
        </a>
        <a href="https://www.tiktok.com/@_tech_ai_?..." target="_blank" class="icon-link tiktok">
            <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
        </a>
    </div>

    <script>
        const text = document.getElementById('welcome-text');
        const msgs = ["خێرهاتن بۆ پەیجی", "Welcome to page"];
        let i = 0;
        setInterval(() => {
            text.style.opacity = 0;
            setTimeout(() => {
                i = (i + 1) % msgs.length;
                text.innerText = msgs[i];
                text.style.opacity = 1;
            }, 500);
        }, 3000);
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech AI Website</title>
    <style>
        :root {
            --primary-bg: #0a192f;
            --accent-blue: #00d2ff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--primary-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
        }

        .container {
            text-align: center;
            position: relative;
            width: 100%;
            max-width: 500px;
        }

        /* 1. Header with changing language */
        #welcome-text {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 50px;
            height: 40px;
            color: var(--accent-blue);
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        /* 2. Rotating Earth Effect */
        .earth-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 100px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/2/22/Earth_Western_Hemisphere_transparent_background.png') no-repeat center;
            background-size: contain;
            border-radius: 50%;
            box-shadow: inset -10px -10px 50px #000, 0 0 30px var(--accent-blue);
            animation: rotateEarth 10s linear infinite;
        }

        @keyframes rotateEarth {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 3. Rotating Icons around the center */
        .icons-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            animation: rotateWrapper 15s linear infinite;
        }

        @keyframes rotateWrapper {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .icon-link {
            position: absolute;
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
        }

        /* Keep icons upright while the wrapper rotates */
        .icon-link img {
            width: 40px;
            height: 40px;
            animation: counterRotate 15s linear infinite;
        }

        @keyframes counterRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        /* Position icons in a circle */
        .instagram { top: 0; left: 50%; margin-left: -30px; }
        .telegram { bottom: 0; left: 50%; margin-left: -30px; }
        .tiktok { left: 0; top: 50%; margin-top: -30px; }

        .icon-link:hover {
            transform: scale(1.2);
            box-shadow: 0 0 20px var(--accent-blue);
        }

        /* Phone visual base */
        .phone-base {
            width: 200px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            margin: 20px auto;
            border-radius: 50%;
            filter: blur(5px);
        }

    </style>
</head>
<body>

    <div class="container">
        <h1 id="welcome-text">خێرهاتن بۆ پەیجی</h1>

        <div class="earth-container"></div>

        <div class="icons-wrapper">
            <a href="https://www.instagram.com/__tech_.ai._?igsh=MTZ2ZGIxcXB2YjVjaw%3D%3D&utm_source=qr" class="icon-link instagram" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" alt="Instagram">
            </a>

            <a href="https://t.me/tech_ai_falah" class="icon-link telegram" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" alt="Telegram">
            </a>

            <a href="https://www.tiktok.com/@_tech_ai_?_r=1&_t=ZS-95TZdN7XgRN" class="icon-link tiktok" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" alt="TikTok">
            </a>
        </div>

        <div class="phone-base"></div>
        <h2 style="color: var(--accent-blue); letter-spacing: 5px;">TECH AI</h2>
    </div>

    <script>
        const welcomeText = document.getElementById('welcome-text');
        const messages = ["خێرهاتن بۆ پەیجی", "Welcome to page"];
        let currentIndex = 0;

        setInterval(() => {
            currentIndex = (currentIndex + 1) % messages.length;
            welcomeText.style.opacity = 0;
            
            setTimeout(() => {
                welcomeText.innerText = messages[currentIndex];
                welcomeText.style.opacity = 1;
            }, 500);
            
        }, 2000); // هەر ٢ چرکە جاران دهێتە گوهۆڕین
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Ai - Welcome</title>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --primary-blue: #00a2ff;
            --bg-dark: #020b1d;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #0a2472 0%, #020b1d 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 50px;
            z-index: 2;
            padding: 20px;
        }

        /* Welcome Text */
        .welcome-header {
            position: absolute;
            top: 5%;
            text-align: center;
            width: 100%;
        }
        .welcome-header h1 {
            font-size: 1.8rem;
            text-shadow: 0 0 15px var(--primary-blue);
            margin: 5px;
        }

        /* Earth & Animation Zone */
        .world-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .earth {
            width: 180px;
            height: 180px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Earth_Western_Hemisphere_transparent_background.png/1200px-Earth_Western_Hemisphere_transparent_background.png');
            background-size: cover;
            border-radius: 50%;
            box-shadow: inset 0 0 50px #00a2ff, 0 0 30px rgba(0, 162, 255, 0.5);
            animation: rotateEarth 15s linear infinite;
        }

        .tech-ai-label {
            position: absolute;
            font-weight: bold;
            font-size: 1.5rem;
            color: #fff;
            text-shadow: 0 0 20px var(--primary-blue);
            z-index: 5;
        }

        @keyframes rotateEarth {
            from { background-position: 0 0; }
            to { background-position: 100% 0; }
        }

        /* Glowing Dots Background */
        .dots {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        /* Social Buttons List */
        .social-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 20px 40px;
            width: 250px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-card:hover {
            transform: translateX(10px);
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--primary-blue);
        }

        .social-icon {
            font-size: 1.5rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { flex-direction: column; text-align: center; }
            .glass-card:hover { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

    <div class="welcome-header">
        <h1>بخێرهاتی بۆ دنیای تەکنەلۆژیا</h1>
        <h1>Welcome to Tech World</h1>
    </div>

    <div class="container">
        <div class="world-container">
            <div class="dots">
                <svg viewBox="0 0 100 100" style="width:100%; height:100%">
                    <circle cx="20" cy="20" r="1" fill="#00a2ff" />
                    <circle cx="80" cy="30" r="1.5" fill="#00a2ff" />
                    <circle cx="50" cy="80" r="1" fill="#00a2ff" />
                    <circle cx="10" cy="70" r="1.2" fill="#00a2ff" />
                </svg>
            </div>
            <div class="earth"></div>
            <div class="tech-ai-label">Tech Ai</div>
        </div>

        <div class="social-list">
            <a href="https://t.me/tech_ai_falah" target="_blank" class="glass-card">
                <span class="social-icon">✈️</span>
                <div>
                    <strong>Telegram</strong>
                    <div style="font-size: 0.8rem; opacity: 0.7;">Join our channel</div>
                </div>
            </a>

            <a href="https://www.instagram.com/__tech_.ai._?igsh=MTZ2ZGIxcXB2YjVjaw%3D%3D&utm_source=qr" target="_blank" class="glass-card">
                <span class="social-icon">📸</span>
                <div>
                    <strong>Instagram</strong>
                    <div style="font-size: 0.8rem; opacity: 0.7;">Follow us</div>
                </div>
            </a>

            <a href="https://www.tiktok.com/@_tech_ai_?_r=1&_t=ZS-95TTeSTubMO" target="_blank" class="glass-card">
                <span class="social-icon">🎵</span>
                <div>
                    <strong>TikTok</strong>
                    <div style="font-size: 0.8rem; opacity: 0.7;">Watch our videos</div>
                </div>
            </a>
        </div>
    </div>

</body>
</html>

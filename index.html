<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech AI - Dashboard</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1a3a5f 0%, #050a14 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }

        /* ل سەرێ شاشێ: گوهۆڕینا زمان */
        #header-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00e5ff;
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.7);
            height: 50px;
            transition: opacity 0.5s ease-in-out;
        }

        /* شێوازێ موبایلێ و پاشبنەمایا وێنەی */
        .main-scene {
            position: relative;
            width: 350px;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ناڤێ ل سەر شاشێ (TECH AI) */
        .brand-name {
            position: absolute;
            top: 20px;
            font-size: 3rem;
            font-weight: 900;
            color: rgba(0, 229, 255, 0.8);
            letter-spacing: 5px;
            pointer-events: none;
        }

        /* تەپا دنیا - زڤڕۆک */
        .earth {
            width: 120px;
            height: 120px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/2/22/Earth_Western_Hemisphere_transparent_background.png') no-repeat center;
            background-size: cover;
            border-radius: 50%;
            box-shadow: inset -10px -10px 40px #000, 0 0 40px #00e5ff;
            animation: rotateEarth 12s linear infinite;
            z-index: 5;
            position: relative;
            bottom: 30px;
        }

        @keyframes rotateEarth {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ئایکۆنێن زڤڕۆک ل دور تەپا دنیا */
        .icon-orbit {
            position: absolute;
            width: 280px;
            height: 280px;
            border: 1px solid rgba(0, 229, 255, 0.1);
            border-radius: 50%;
            animation: rotateOrbit 20s linear infinite;
        }

        @keyframes rotateOrbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .social-icon {
            position: absolute;
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
            transition: 0.3s;
        }

        /* پێگەهاندنا ئایکۆنان د ئۆربیتێ دا */
        .ig { top: 10%; left: 80%; }
        .tg { top: 60%; left: -5%; }
        .tk { top: 80%; left: 80%; }

        /* موبایلا ل خوارێ */
        .phone-mockup {
            position: absolute;
            bottom: 20px;
            width: 250px;
            height: 120px;
            background: #0d1b2a;
            border: 2px solid #1e3a5f;
            border-radius: 20px;
            transform: perspective(500px) rotateX(60deg);
            box-shadow: 0 20px 50px rgba(0, 229, 255, 0.3);
        }

        .phone-mockup::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #00e5ff 0%, transparent 70%);
            opacity: 0.5;
        }

        .social-icon img { width: 35px; height: 35px; }
        .social-icon:hover { transform: scale(1.2); cursor: pointer; }

    </style>
</head>
<body>

    <h1 id="header-title">خێرهاتن بۆ پەیجی</h1>

    <div class="main-scene">
        <div class="brand-name">TECH AI</div>
        
        <div class="phone-mockup"></div>

        <div class="earth"></div>

        <div class="icon-orbit">
            <a href="https://www.instagram.com/__tech_.ai._?igsh=MTZ2ZGIxcXB2YjVjaw%3D%3D&utm_source=qr" target="_blank" class="social-icon ig">
                <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png">
            </a>
            <a href="https://t.me/tech_ai_falah" target="_blank" class="social-icon tg">
                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
            </a>
            <a href="https://www.tiktok.com/@_tech_ai_?_r=1&_t=ZS-95TZdN7XgRN" target="_blank" class="social-icon tk">
                <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
            </a>
        </div>
    </div>

    <script>
        const title = document.getElementById('header-title');
        const textArr = ["خێرهاتن بۆ پەیجی", "Welcome to page"];
        let i = 0;

        setInterval(() => {
            title.style.opacity = 0;
            setTimeout(() => {
                i = (i + 1) % textArr.length;
                title.innerText = textArr[i];
                title.style.opacity = 1;
            }, 500);
        }, 3000);
    </script>

</body>
</html>
